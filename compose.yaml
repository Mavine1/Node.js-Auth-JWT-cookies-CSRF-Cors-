services:
  server:
    build:
      context: ./server
    container_name: security-course-server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}

  web:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: security-course-web
    ports:
      - "80:80"
    depends_on:
      - server